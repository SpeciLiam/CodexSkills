name: Notion application sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

jobs:
  sync:
    if: ${{ github.event_name == 'workflow_dispatch' || vars.NOTION_SYNC_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh visualizer cache
        run: python3 skills/application-visualizer-refresh/scripts/refresh_visualizer_data.py

      - name: Sync applications to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python3 skills/notion-application-sync/scripts/sync_applications_to_notion.py --update-title
