name: Housing source health

# Read-only cloud health backstop for the bay-area-housing-hunt skill. Once daily it
# tests the pipeline and probes the headless tiers against the checked-out snapshot.
# It does NOT log into Facebook/Zillow/Apartments.com/Furnished Finder (no browser)
# and does NOT commit, deploy, or mutate Notion. Local Codex/Claude runs remain the
# only canonical writers; this job uploads diagnostics for inspection.

on:
  workflow_dispatch:
  schedule:
    - cron: "17 14 * * *"   # daily, off the top of the hour

concurrency:
  group: housing-source-health
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run housing regression tests
        run: python3 -m unittest discover -s skills/bay-area-housing-hunt/scripts/tests -v

      - name: Probe headless sources and build health artifact
        env:
          HOUSING_TRACKER_DIR: ${{ runner.temp }}/housing-trackers
          HOUSING_LOCK_FILE: ${{ runner.temp }}/housing-pipeline.lock
          HOUSING_CONDUCTOR_LOCK_FILE: ${{ runner.temp }}/housing-conductor.lock
        run: |
          mkdir -p "$HOUSING_TRACKER_DIR"
          cp housing-trackers/listings.md housing-trackers/power-rankings.md "$HOUSING_TRACKER_DIR/"
          python3 skills/bay-area-housing-hunt/scripts/run.py \
            --fresh-capture-dir \
            --capture-dir "$RUNNER_TEMP/housing-captures" \
            --decay-scope covered
          python3 skills/bay-area-housing-hunt/scripts/export_housing_data.py

      - name: Fail on unhealthy selected headless sources
        env:
          HOUSING_HEALTH_FILE: ${{ runner.temp }}/housing-trackers/run-health.json
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          health = json.loads(Path(os.environ["HOUSING_HEALTH_FILE"]).read_text())
          selected = [row for row in health.get("sources", []) if row.get("selectedThisRun") is not False]
          bad_statuses = {"blocked", "degraded", "missing", "malformed", "empty"}
          unhealthy = [
              row for row in selected
              if row.get("tier") != "ai_browser" and row.get("status") in bad_statuses
          ]
          if not selected:
              raise SystemExit("health probe selected zero sources")
          if unhealthy:
              for row in unhealthy:
                  print(f"{row.get('id')}: {row.get('status')} — {row.get('message', '')}")
              raise SystemExit(f"{len(unhealthy)} selected headless source(s) unhealthy")
          print(f"health gate passed: {len(selected)} selected sources; browser-pending is allowed")
          PY

      - name: Upload refreshed board
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: housing-board
          path: |
            ${{ runner.temp }}/housing-trackers/*.md
            ${{ runner.temp }}/housing-trackers/run-health.json
            housing-visualizer/src/data/housing-data.json
          if-no-files-found: warn
